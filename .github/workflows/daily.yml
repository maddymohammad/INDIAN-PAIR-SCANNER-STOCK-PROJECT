name: Daily Pairs Scan

on:
  schedule:
    # 18:30 IST = 13:00 UTC, Mon–Fri (after NSE close at 15:30 IST)
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

# Lets the built-in (free) GITHUB_TOKEN commit the daily report back to the repo.
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"      # stable; matches the pinned deps
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pairs scan
        run: python run_daily.py

      - name: Commit report + charts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "pairs scan: $(date -u +%Y-%m-%d)"
            git push
          fi
